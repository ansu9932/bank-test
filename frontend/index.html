<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Alister Bank — Secure Digital Banking" />
    <meta name="theme-color" content="#c8102e" />
    <title>Alister Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Load Google Fonts asynchronously so it is NOT render-blocking.
      `preload as=style` fetches without blocking paint, then the onload handler
      promotes it to a real stylesheet. `display=swap` (in the URL) means text
      paints instantly in a fallback font and swaps when the web font arrives.
      The <noscript> keeps it working when JS is disabled.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Native-app watchdog (Capacitor serves from https://localhost, so this
      never activates on the real website). Catches fatal errors that happen
      BEFORE React mounts — including bundle parse failures on old WebViews —
      and shows the message instead of leaving a permanent blank screen.
    -->
    <script>
      (function () {
        if (location.hostname !== 'localhost') return;
        function show(msg) {
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return; // app mounted — ignore
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0A0A0A;color:#fff;font-family:sans-serif;padding:24px;text-align:center;">' +
            '<p style="font-size:17px;font-weight:600;">App failed to start</p>' +
            '<p style="font-size:12px;color:#999;max-width:320px;word-break:break-word;">' +
            String(msg).replace(/</g, '&lt;').slice(0, 400) +
            '</p>' +
            '<button onclick="location.reload()" style="background:#CC0000;color:#fff;border:0;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:600;">Try Again</button>' +
            '</div>';
        }
        window.addEventListener('error', function (e) {
          show(e.message || (e.error && e.error.message) || 'Unknown script error');
        });
        window.addEventListener('unhandledrejection', function (e) {
          show((e.reason && e.reason.message) || String(e.reason || 'Unhandled rejection'));
        });
        // Watchdog: if nothing rendered after 8s, tell the user instead of
        // showing a blank screen forever.
        setTimeout(function () {
          show('The app did not finish loading. Check your internet connection and try again.');
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
